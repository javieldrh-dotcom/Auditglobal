<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGI OMNI-SENTINEL v8.0 | The Final Settlement</title>
    <style>
        :root { --bg: #010409; --acc: #3b82f6; --ia-green: #00ff41; --danger: #ff3e3e; --warn: #f59e0b; --gray: #8b949e; --text: #f0f6fc; --card: #0d1117; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        header { background: rgba(1, 4, 9, 0.98); border-bottom: 1px solid #30363d; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .nav-btn { background: transparent; border: 1px solid var(--acc); color: var(--acc); padding: 6px 15px; cursor: pointer; font-size: 11px; border-radius: 4px; font-weight: 600; text-transform: uppercase; }

        .view-section { display: none; padding: 25px; max-width: 1400px; margin: 0 auto; animation: slideUp 0.4s ease; }
        .active-view { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        /* Dashboard de Control */
        .grid-dashboard { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--card); border: 1px solid #30363d; padding: 20px; border-top: 3px solid var(--acc); border-radius: 6px; }
        .stat-val { font-size: 24px; font-weight: 800; }
        .stat-lbl { font-size: 10px; color: var(--gray); text-transform: uppercase; }

        /* Layout Principal */
        .main-engine { display: grid; grid-template-columns: 1fr 400px; gap: 20px; height: 500px; }
        #radar-container { background: #000; border: 1px solid #30363d; border-radius: 8px; position: relative; overflow: hidden; }
        .terminal { background: #010409; border: 1px solid #30363d; border-radius: 8px; padding: 20px; color: var(--ia-green); font-size: 12px; overflow-y: auto; line-height: 1.6; }

        /* Panel de Negociación (Smart-Settlement) */
        #settlement-panel { display: none; background: #0d1117; border: 1px solid var(--warn); padding: 20px; border-radius: 8px; margin-top: 20px; border-left: 5px solid var(--warn); }
        .negotiation-log { background: #000; padding: 10px; font-size: 11px; color: var(--warn); height: 100px; overflow-y: auto; margin: 10px 0; border: 1px solid #333; }

        .btn-action { padding: 15px; border: none; border-radius: 6px; font-weight: 800; text-transform: uppercase; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-neg { background: var(--warn); color: black; }
        .btn-neg:disabled { opacity: 0.3; cursor: not-allowed; }

        .node { position: absolute; border-radius: 50%; background: var(--acc); transform: translate(-50%, -50%); transition: 1s; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 255, 65, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(0, 255, 65, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 255, 65, 0); } }
        .node-target { background: var(--danger); animation: pulse 2s infinite; }
    </style>
</head>
<body>

    <header class="no-print">
        <div style="color:var(--ia-green); font-size:11px; font-weight:bold;">SYSTEM READY: OMNI-SENTINEL v8.0</div>
        <div>
            <button class="nav-btn" onclick="switchView('portal-view')">Portal</button>
            <button class="nav-btn" onclick="switchView('console-view')">Consola</button>
        </div>
    </header>

    <div id="portal-view" class="view-section active-view">
        <div style="max-width: 500px; margin: 50px auto; background: var(--card); padding: 40px; border-radius: 12px; border: 1px solid #30363d; text-align: center;">
            <h2 style="color:var(--acc)">Ecosistema de Recuperación</h2>
            <input type="text" id="target-name" placeholder="Representante Legal" style="width:100%; padding:15px; margin:10px 0; background:#010409; border:1px solid #333; color:white; border-radius:6px;">
            <input type="number" id="target-amount" placeholder="Monto a Recuperar (USD)" style="width:100%; padding:15px; margin:10px 0; background:#010409; border:1px solid #333; color:white; border-radius:6px;">
            <input type="text" id="target-hash" placeholder="Wallet Hash" style="width:100%; padding:15px; margin:10px 0; background:#010409; border:1px solid #333; color:white; border-radius:6px;">
            <button class="btn-action" style="background:var(--acc); color:white;" onclick="initSystem()">Iniciar Auditoría</button>
        </div>
    </div>

    <div id="console-view" class="view-section">
        <div class="grid-dashboard">
            <div class="stat-card"><div class="stat-val" id="val-cap">$0</div><div class="stat-lbl">Activos Trazados</div></div>
            <div class="stat-card" style="border-top-color: var(--ia-green);"><div class="stat-val">98.7%</div><div class="stat-lbl">Confianza ID</div></div>
            <div class="stat-card" style="border-top-color: var(--warn);"><div class="stat-val" id="val-status">READY</div><div class="stat-lbl">Negociación</div></div>
            <div class="stat-card"><div class="stat-val" style="color:var(--ia-green)">ACTIVE</div><div class="stat-lbl">Ecosistema Soberano</div></div>
        </div>

        <div class="main-engine no-print">
            <div id="radar-container"></div>
            <div class="terminal" id="term-logs">[SYS]: Kernel activo. Esperando protocolo...</div>
        </div>

        <div id="settlement-panel">
            <h3 style="margin:0; color:var(--warn);">CANAL DE LIQUIDACIÓN SMART-SETTLEMENT</h3>
            <p style="font-size:11px; color:var(--gray);">Canal encriptado abierto con el agresor identificado como Nikolai V.</p>
            <div class="negotiation-log" id="neg-log"></div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button class="btn-action btn-neg" id="btn-neg" onclick="startNegotiation()">Iniciar Negociación IA</button>
                <button class="btn-action" style="background:var(--ia-green); color:black;" id="btn-release" disabled onclick="finalizeRecovery()">Ejecutar Contrato Escrow</button>
            </div>
        </div>

        <button class="btn-action" id="btn-master" style="background:var(--acc); color:white; margin-top:20px;" onclick="runEcosystemFlow()">Ejecutar Flujo Maestro de Recuperación</button>
    </div>

    <script>
        function switchView(id) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active-view'));
            document.getElementById(id).classList.add('active-view');
        }

        function initSystem() {
            const amt = document.getElementById('target-amount').value;
            if(!amt) return alert("Ingrese el monto.");
            document.getElementById('val-cap').innerText = "$" + parseFloat(amt).toLocaleString();
            switchView('console-view');
        }

        async function runEcosystemFlow() {
            const term = document.getElementById('term-logs');
            const radar = document.getElementById('radar-container');
            document.getElementById('btn-master').disabled = true;

            const logs = [
                {m: "Iniciando Agent Cluster v8.0...", c: 'var(--ia-green)'},
                {m: "Identificando nodos de Nikolai V. mediante OSINT/GNN...", c: 'var(--ia-green)'},
                {m: "INTERCEPCIÓN: Capital detectado en Gateway de Salida.", c: 'var(--danger)'},
                {m: "Enviando Dossier de Evidencia al Exchange...", c: 'var(--acc)'},
                {m: "BLOQUEO CONFIRMADO. Abriendo canal de negociación...", c: 'var(--warn)'}
            ];

            for(let log of logs) {
                term.innerHTML += `<div style="color:${log.c}">> ${log.m}</div>`;
                term.scrollTop = term.scrollHeight;
                let n = document.createElement('div');
                n.className = 'node' + (log.c === 'var(--danger)' ? ' node-target' : '');
                n.style.left = Math.random()*80+10+'%'; n.style.top = Math.random()*80+10+'%';
                radar.appendChild(n);
                await new Promise(r => setTimeout(r, 1500));
            }

            document.getElementById('settlement-panel').style.display = 'block';
        }

        async function startNegotiation() {
            const nLog = document.getElementById('neg-log');
            const steps = [
                "AGI: Dossier pericial entregado al agresor. Bloqueo en CEX activo.",
                "Sujeto (Nikolai): ¿Cómo me encontraron? ¿Qué quieren?",
                "AGI: Protocolo de Devolución Voluntaria (90%) habilitado. Plazo: 10 min.",
                "Sujeto (Nikolai): Acepto. Firmando contrato de devolución Escrow..."
            ];

            for(let s of steps) {
                nLog.innerHTML += `<div>[NEG]: ${s}</div>`;
                nLog.scrollTop = nLog.scrollHeight;
                await new Promise(r => setTimeout(r, 2000));
            }
            document.getElementById('btn-release').disabled = false;
            document.getElementById('val-status').innerText = "SIGNED";
            document.getElementById('val-status').style.color = "var(--ia-green)";
        }

        function finalizeRecovery() {
            alert("RECUPERACIÓN COMPLETADA:\nEl capital ha sido devuelto a la wallet del cliente mediante Smart Contract.\nEl caso ha sido archivado como Recuperación Exitosa.");
            location.reload();
        }
    </script>
</body>
</html>
