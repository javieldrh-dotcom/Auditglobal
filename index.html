<script>
    // 3. Marca de Agua Forense Invisible (Metadata Inyectada)
    function injectForensicWatermark(clientId) {
        const metadata = btoa(JSON.stringify({
            origin: "AGI-Forensic",
            client: clientId,
            timestamp: Date.now(),
            compliance: "ISO-27001/NIA-240"
        }));
        console.log("Inyectando Marca Forense Invisible: " + metadata);
        return metadata;
    }

    // 4. KYC/AML Automatizado (Simulación de Cumplimiento)
    async function runKYCCheck(name, id) {
        addLog("Ejecutando escaneo AML/KYC en listas globales...");
        // Simulación de validación contra listas de sanciones
        return new Promise(resolve => setTimeout(() => resolve(true), 1500));
    }

    // 2. Simulación de Tokenización Blockchain (NFT Minting)
    function mintCertNFT(reportHash) {
        addLog("Generando Certificado NFT inalterable en Blockchain...");
        const nftId = "AGI-NFT-" + Math.random().toString(36).substr(2, 9).toUpperCase();
        return nftId;
    }

    // Actualización de la función de generación de contrato con estas cualidades
    async function genContract() {
        const n = document.getElementById('c-name').value;
        const id = document.getElementById('c-id').value;
        const amt = parseFloat(document.getElementById('c-amount').value);

        if(!n || !id || isNaN(amt)) return alert("Datos incompletos para cumplimiento.");

        // Ejecutar Cumplimiento antes de proceder
        const isClear = await runKYCCheck(n, id);
        if(!isClear) return alert("Alerta de Cumplimiento: Cliente no apto.");

        // Inyectar marca de agua y generar ID de reporte
        const forensicStamp = injectForensicWatermark(id);
        const nftId = mintCertNFT(document.getElementById('h-in').value);

        // Lógica de Honorarios por Éxito (Cualidad 1)
        let successFee = amt > 100000 ? "5%" : "3%";
        
        // Renderizar en el contrato
        document.getElementById('out-n').innerText = n;
        document.getElementById('out-h').innerText = document.getElementById('h-in').value;
        
        // Añadir cláusula de éxito al contrato
        const legalClause = `<p style='font-size:10px; color:var(--gray);'><b>CLÁUSULA DE ÉXITO:</b> Se establece un honorario por recuperación del ${successFee} sobre el capital total retornado.</p>`;
        
        document.getElementById('contract-view').innerHTML += legalClause;
        document.getElementById('f-screen').style.display='none';
        document.getElementById('contract-view').style.display='block';
        
        addLog(`Sistema listo. NFT vinculado: ${nftId}`);
    }
</script>
